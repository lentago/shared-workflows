# ============================================================================
# Reusable: Claude Code Review
# ============================================================================
# Reusable workflow for automated PR review. Callers wire up the on:
# pull_request trigger (with their own paths-ignore filter) and pass a
# repo-specific review_prompt; this workflow handles the boilerplate
# (PR context header, fleet PR-workflow checks, common rules, output format).
#
# Pinned to Haiku by default — review is mechanical pattern-matching.
#
# SYNC OBLIGATION: the "Fleet PR-workflow checks" block in the prompt below
# mirrors the canonical "Fleet PR-workflow (canonical source)" section in
# this repo's CLAUDE.md. If you edit one, edit the other. Keep them
# semantically aligned — the .md guides actors, the prompt block frames the
# same rules as review criteria the reviewer flags.
# ============================================================================

name: Claude Code Review (reusable)

on:
  workflow_call:
    inputs:
      review_prompt:
        description: "Repo-specific focus block. Inserted between the PR-context header and the common rules."
        type: string
        required: true
      model:
        description: "Model to use for review"
        type: string
        default: "haiku"
      max_turns:
        description: "Max agent turns"
        type: number
        default: 15
      allowed_bots:
        description: "Value for the action's allowed_bots input. Defaults to \"*\" so the fleet's runner-bot PRs are reviewed (every fleet PR is opened by pitzilabs-claude-runner[bot]); pass a specific login to narrow, or \"\" to disable bot reviews entirely."
        type: string
        default: "*"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  claude-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: ${{ inputs.allowed_bots }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request. The PR branch is already checked out.

            ${{ inputs.review_prompt }}

            Fleet PR-workflow checks (flag PRs that violate any of these — these
            mirror the canonical rules in PitziLabs/shared-workflows CLAUDE.md
            "Fleet PR-workflow (canonical source)"; treat each as a review item):

            1. ISSUE LINK — the PR body must contain `Closes #<n>`, `Fixes
               #<n>`, or `Resolves #<n>` so merge closes the linked issue.
               Inspect: `gh pr view ${{ github.event.pull_request.number }}
               --json body,title`. Flag if absent.
            2. TITLE ALIGNMENT — when an issue is linked, the PR title should
               match or clearly refine that issue's title (don't be pedantic
               about phrasing; flag only when the title is misleading about
               what the PR does).
            3. SCOPE DISCIPLINE — changes should match the linked issue's
               scope. Flag substantive unrelated changes bundled in
               (e.g., an issue about renaming X also rewrites unrelated Y).
               Adjacent fixes belong in separate tickets.
            4. CO-AUTHORSHIP DISCLOSURE — if README.md or CHANGELOG.md is
               among the changed files and the diff narrates substantive
               feature work, flag if the changed section lacks an explicit
               "Generated with Claude" / "Co-authored with Claude" disclosure
               at the top of that section (commit trailers alone are not
               enough — this is Chris's operator-not-SWE convention).
            5. ORIGIN SECTION — fleet-wide, every PitziLabs repo: the PR body
               must open with an `## Origin` section — a third-person
               past-tense narrative of who asked for the change and what they
               wanted (not a verbatim prompt dump). Inspect the body from the
               `gh pr view` call above. Flag if the `## Origin` heading is
               absent, or if it just quotes the prompt verbatim instead of
               narrating intent. The matching `Prompt-Origin:` commit trailer
               is the durable mirror — optionally spot-check it via
               `gh pr view --json commits`, but the body section is the
               required artifact.

            Rules:
            - Only comment on actual problems or meaningful improvements
            - Do NOT comment on style, formatting, or naming preferences
            - Do NOT give positive feedback or praise — just flag issues
            - Do NOT propose inline fix code — describe the problem and why it
              matters, not the solution. Fixes go through a separate commit.
            - If nothing significant is wrong, say so in one sentence and move on

            Output format:
            - Read the full diff and any source files needed for context
            - Collect ALL findings before producing any output
            - Return a single consolidated review — do not post comments
              incrementally as you discover issues
          claude_args: |
            --max-turns ${{ inputs.max_turns }}
            --model ${{ inputs.model }}
            --allowedTools "Bash(gh pr diff:*),Bash(gh pr view:*),Read"

      - name: Render execution to step summary
        if: always() && steps.claude.outputs.execution_file != ''
        uses: PitziLabs/shared-workflows/.github/actions/render-claude-summary@main
        with:
          execution_file: ${{ steps.claude.outputs.execution_file }}
